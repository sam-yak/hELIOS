<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helios — Engineering Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #181a20;
            --bg-tertiary: #1e2028;
            --bg-card: #22242e;
            --bg-hover: #2a2d3a;
            --border: #2a2d3a;
            --border-light: #353848;
            --text-primary: #e8e9ed;
            --text-secondary: #9ca0ae;
            --text-muted: #6b7084;
            --accent: #f0a030;
            --accent-dim: rgba(240, 160, 48, 0.12);
            --accent-glow: rgba(240, 160, 48, 0.25);
            --user-bubble: #1a2a4a;
            --user-border: #2a3f6a;
            --success: #34d399;
            --error: #f87171;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { height: 100%; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--bg-secondary);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-mark {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f0a030, #e67e22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        .logo-tag {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px rgba(52, 211, 153, 0.5);
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .btn-new-chat {
            margin-left: 0.75rem;
            padding: 0.4rem 0.85rem;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-new-chat:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        /* ── CHAT AREA ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── WELCOME STATE ── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 1rem;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 24px var(--accent-glow));
        }
        .welcome h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .welcome p {
            color: var(--text-muted);
            font-size: 0.9rem;
            max-width: 380px;
            line-height: 1.5;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.5rem;
        }
        .suggestion-chip {
            padding: 0.45rem 0.9rem;
            font-size: 0.8rem;
            font-family: inherit;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .suggestion-chip:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── MESSAGES ── */
        .message {
            max-width: 720px;
            margin: 0 auto 1.25rem;
            opacity: 0;
            animation: fadeUp 0.35s ease forwards;
        }
        .message-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.35rem;
            padding-left: 0.15rem;
        }
        .message-label.user { color: #60a5fa; }
        .message-label.ai { color: var(--accent); }

        .message-bubble {
            padding: 1rem 1.15rem;
            border-radius: var(--radius);
            line-height: 1.65;
            font-size: 0.92rem;
        }
        .message-bubble.user {
            background: var(--user-bubble);
            border: 1px solid var(--user-border);
        }
        .message-bubble.ai {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        /* ── MARKDOWN INSIDE AI BUBBLES ── */
        .message-bubble.ai h1, .message-bubble.ai h2, .message-bubble.ai h3 {
            font-family: 'DM Sans', sans-serif;
            margin: 1rem 0 0.4rem;
            color: var(--text-primary);
        }
        .message-bubble.ai h1 { font-size: 1.1rem; }
        .message-bubble.ai h2 { font-size: 1rem; }
        .message-bubble.ai h3 { font-size: 0.95rem; }
        .message-bubble.ai p { margin-bottom: 0.6rem; }
        .message-bubble.ai ul, .message-bubble.ai ol {
            margin: 0.4rem 0 0.8rem 1.2rem;
        }
        .message-bubble.ai li { margin-bottom: 0.25rem; }
        .message-bubble.ai strong { color: var(--text-primary); font-weight: 600; }
        .message-bubble.ai code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            background: var(--bg-primary);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            color: var(--accent);
        }
        .message-bubble.ai pre {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.8rem;
            overflow-x: auto;
            margin: 0.6rem 0;
        }
        .message-bubble.ai pre code {
            background: none;
            padding: 0;
            color: var(--text-secondary);
        }
        .message-bubble.ai table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.8rem 0;
            font-size: 0.85rem;
        }
        .message-bubble.ai th {
            background: var(--bg-primary);
            font-weight: 600;
            text-align: left;
            padding: 0.55rem 0.7rem;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .message-bubble.ai td {
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* ── THINKING INDICATOR ── */
        .thinking-dots { display: inline-flex; gap: 4px; padding: 0.25rem 0; }
        .thinking-dots span {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── SOURCES ── */
        .sources-section {
            margin-top: 0.75rem;
            border-top: 1px solid var(--border);
            padding-top: 0.65rem;
        }
        .sources-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .source-item {
            margin-bottom: 0.3rem;
        }
        .source-toggle {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            text-align: left;
        }
        .source-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .source-toggle .arrow {
            font-size: 0.65rem;
            transition: transform var(--transition);
        }
        .source-toggle.open .arrow { transform: rotate(90deg); }
        .source-content {
            display: none;
            padding: 0.65rem;
            margin: 0.15rem 0 0.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .source-content.open { display: block; }

        /* ── EXPORT BAR ── */
        .export-bar {
            display: none;
            max-width: 720px;
            margin: -0.5rem auto 1rem;
            padding: 0.65rem 0.9rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            align-items: center;
            justify-content: space-between;
            font-size: 0.82rem;
            animation: fadeUp 0.3s ease forwards;
        }
        .export-bar.visible { display: flex; }
        .export-material {
            color: var(--accent);
            font-weight: 600;
        }
        .export-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .export-select {
            padding: 0.3rem 0.5rem;
            font-size: 0.78rem;
            font-family: inherit;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            outline: none;
        }
        .export-select:focus { border-color: var(--accent); }
        .btn-export {
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--bg-primary);
            background: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-export:hover { filter: brightness(1.1); }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 1rem 1.5rem 1.25rem;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }
        .input-wrapper {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
        }
        .input-field {
            width: 100%;
            padding: 0.85rem 1rem;
            padding-right: 3.5rem;
            font-size: 0.92rem;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            resize: none;
            outline: none;
            transition: border-color var(--transition);
            line-height: 1.5;
        }
        .input-field::placeholder { color: var(--text-muted); }
        .input-field:focus { border-color: var(--accent); }
        .btn-send {
            position: absolute;
            right: 0.6rem;
            bottom: 0.6rem;
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1.1rem;
        }
        .btn-send:hover { filter: brightness(1.1); transform: scale(1.04); }
        .btn-send:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
            filter: none;
        }
        .input-hint {
            text-align: center;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .header { padding: 0.75rem 1rem; }
            .chat-area { padding: 1rem; }
            .input-area { padding: 0.75rem 1rem 1rem; }
            .logo-text { font-size: 1.15rem; }
            .suggestions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo-mark">☀️</div>
            <div>
                <div class="logo-text">Helios</div>
                <div class="logo-tag">Materials Engineering Assistant</div>
            </div>
        </div>
        <div class="header-right">
            <span class="status-dot"></span>
            <span class="status-label">Online</span>
            <button class="btn-new-chat" id="new-chat-button">New Chat</button>
        </div>
    </header>

    <!-- CHAT -->
    <main class="chat-area" id="chat-area">
        <div class="welcome" id="welcome-screen">
            <div class="welcome-icon">☀️</div>
            <h2>What are you building?</h2>
            <p>I can help you find the right materials — search by properties, compare options, or explore the database of 72 engineering materials.</p>
            <div class="suggestions">
                <button class="suggestion-chip" data-query="Compare titanium and aluminum for aerospace">Ti vs Al for aerospace</button>
                <button class="suggestion-chip" data-query="Lightweight corrosion resistant metal">Lightweight + corrosion resistant</button>
                <button class="suggestion-chip" data-query="Materials with yield strength over 800 MPa">Yield strength &gt; 800 MPa</button>
                <button class="suggestion-chip" data-query="Show me all ceramics">Browse ceramics</button>
            </div>
        </div>
    </main>

    <!-- EXPORT BAR (shown when material detected) -->
    <div class="export-bar" id="export-bar">
        <span>Detected: <span class="export-material" id="export-material-name"></span></span>
        <div class="export-controls">
            <select class="export-select" id="export-format">
                <option value="json">JSON</option>
                <option value="csv">CSV</option>
                <option value="txt">Plain Text</option>
            </select>
            <button class="btn-export" id="export-button">Export</button>
        </div>
    </div>

    <!-- INPUT -->
    <footer class="input-area">
        <form class="input-wrapper" id="query-form">
            <textarea class="input-field" id="question-input" rows="1" placeholder="Ask about materials, properties, or applications..." autocomplete="off"></textarea>
            <button type="submit" class="btn-send" id="send-button" title="Send">▶</button>
        </form>
        <div class="input-hint">Powered by Claude &amp; Hybrid RAG — 72 materials across 27 categories</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script>
    const md = window.markdownit ? window.markdownit({ html: false, linkify: true, typographer: true }) : {
        render: (text) => text.replace(/\n/g, '<br>')
    };

    const chatArea = document.getElementById('chat-area');
    const welcomeScreen = document.getElementById('welcome-screen');
    const queryForm = document.getElementById('query-form');
    const questionInput = document.getElementById('question-input');
    const sendButton = document.getElementById('send-button');
    const newChatButton = document.getElementById('new-chat-button');
    const exportBar = document.getElementById('export-bar');
    const exportMaterialName = document.getElementById('export-material-name');
    const exportButton = document.getElementById('export-button');

    let chatHistory = [];
    let currentMaterial = '';

    // Auto-resize textarea
    questionInput.addEventListener('input', () => {
        questionInput.style.height = 'auto';
        questionInput.style.height = Math.min(questionInput.scrollHeight, 150) + 'px';
    });

    // Enter to send (shift+enter for newline)
    questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            queryForm.dispatchEvent(new Event('submit'));
        }
    });

    // Suggestion chips
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            questionInput.value = chip.dataset.query;
            queryForm.dispatchEvent(new Event('submit'));
        });
    });

    function hideWelcome() {
        if (welcomeScreen) {
            welcomeScreen.style.display = 'none';
        }
    }

    function addMessage(role, content, sources) {
        hideWelcome();
        const msg = document.createElement('div');
        msg.className = 'message';

        const label = document.createElement('div');
        label.className = `message-label ${role}`;
        label.textContent = role === 'user' ? 'You' : 'Helios';
        msg.appendChild(label);

        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${role}`;

        if (role === 'ai') {
            bubble.innerHTML = md.render(content);
        } else {
            bubble.textContent = content;
        }
        msg.appendChild(bubble);

        // Sources
        if (sources && sources.length > 0) {
            const section = document.createElement('div');
            section.className = 'sources-section';
            const title = document.createElement('div');
            title.className = 'sources-title';
            title.textContent = `${sources.length} sources referenced`;
            section.appendChild(title);

            sources.forEach(src => {
                const item = document.createElement('div');
                item.className = 'source-item';

                const toggle = document.createElement('button');
                toggle.className = 'source-toggle';
                toggle.innerHTML = `<span class="arrow">▸</span> ${src.source}`;

                const content = document.createElement('div');
                content.className = 'source-content';
                content.textContent = src.content;

                toggle.addEventListener('click', () => {
                    toggle.classList.toggle('open');
                    content.classList.toggle('open');
                });

                item.appendChild(toggle);
                item.appendChild(content);
                section.appendChild(item);
            });
            bubble.appendChild(section);
        }

        chatArea.appendChild(msg);
        chatArea.scrollTop = chatArea.scrollHeight;
        return msg;
    }

    function addThinking() {
        hideWelcome();
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.id = 'thinking-msg';

        const label = document.createElement('div');
        label.className = 'message-label ai';
        label.textContent = 'Helios';
        msg.appendChild(label);

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble ai';
        bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
        msg.appendChild(bubble);

        chatArea.appendChild(msg);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeThinking() {
        const el = document.getElementById('thinking-msg');
        if (el) el.remove();
    }

    // Submit query
    queryForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage('user', question);
        chatHistory.push({ role: 'user', content: question });
        questionInput.value = '';
        questionInput.style.height = 'auto';

        addThinking();
        sendButton.disabled = true;
        exportBar.classList.remove('visible');

        try {
            const response = await fetch('/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    chat_history: chatHistory.slice(0, -1)
                })
            });

            if (!response.ok) throw new Error(`Server error: ${response.status}`);

            const data = await response.json();
            removeThinking();
            addMessage('ai', data.answer, data.sources);
            chatHistory.push({ role: 'ai', content: data.answer });

            if (data.detected_material) {
                currentMaterial = data.detected_material;
                exportMaterialName.textContent = currentMaterial;
                exportBar.classList.add('visible');
            }
        } catch (err) {
            removeThinking();
            addMessage('ai', `Something went wrong: ${err.message}. Please try again.`);
        } finally {
            sendButton.disabled = false;
            questionInput.focus();
        }
    });

    // New chat
    newChatButton.addEventListener('click', () => {
        chatHistory = [];
        currentMaterial = '';
        exportBar.classList.remove('visible');
        chatArea.innerHTML = '';
        // Re-add welcome screen
        const w = document.createElement('div');
        w.className = 'welcome';
        w.id = 'welcome-screen';
        w.innerHTML = `
            <div class="welcome-icon">☀️</div>
            <h2>What are you building?</h2>
            <p>I can help you find the right materials — search by properties, compare options, or explore the database of 72 engineering materials.</p>
            <div class="suggestions">
                <button class="suggestion-chip" data-query="Compare titanium and aluminum for aerospace">Ti vs Al for aerospace</button>
                <button class="suggestion-chip" data-query="Lightweight corrosion resistant metal">Lightweight + corrosion resistant</button>
                <button class="suggestion-chip" data-query="Materials with yield strength over 800 MPa">Yield strength &gt; 800 MPa</button>
                <button class="suggestion-chip" data-query="Show me all ceramics">Browse ceramics</button>
            </div>
        `;
        chatArea.appendChild(w);
        // Re-bind suggestion chips
        w.querySelectorAll('.suggestion-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                questionInput.value = chip.dataset.query;
                queryForm.dispatchEvent(new Event('submit'));
            });
        });
        questionInput.focus();
    });

    // Export
    exportButton.addEventListener('click', async () => {
        if (!currentMaterial) return;
        const format = document.getElementById('export-format').value;
        try {
            const response = await fetch('/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ material_name: currentMaterial, export_format: format })
            });
            if (!response.ok) throw new Error('Export failed');
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentMaterial}.${format}`;
            a.click();
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error('Export error:', err);
        }
    });

    questionInput.focus();
    </script>
</body>
</html>
